<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - At the Den</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-container {
            max-width: 400px;
            width: 90%;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
        }
        
        h2 {
            color: #2a5ca9;
            margin-bottom: 10px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #2a5ca9;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }
        
        button:hover {
            background: #4a7bc8;
        }
        
        .error {
            color: #e63946;
            margin-top: 10px;
        }
        
        .back-link {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="at-the-den-logo.png" alt="Logo" class="logo-icon">
        <h2>Admin Portal</h2>
        <p>Staff & Administrator Login</p>
        <input type="email" id="adminEmail" placeholder="Admin Email">
        <input type="password" id="adminPassword" placeholder="Password">
        <button onclick="adminLogin()">Login as Admin</button>
        <div id="loginError" class="error"></div>
        <a href="student-dashboard.html" class="back-link">← Student Login</a>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        async function adminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            console.log('=== ADMIN LOGIN ===');
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Check if user has admin role
                    if (data.data.role !== 'admin') {
                        document.getElementById('loginError').innerText = 'This account does not have admin privileges.';
                        return;
                    }
                    
                    // Store token with 'adminToken' key for admins
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.data));
                    
                    console.log('✅ Admin login successful!');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    document.getElementById('loginError').innerText = data.error || 'Login failed';
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('loginError').innerText = 'Connection error: ' + error.message;
            }
        }
    </script>
</body>
</html>
