<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - At the Den Emergency System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #2a5ca9;
            --primary-light: #4a7bc8;
            --danger: #e63946;
            --success: #2ecc71;
            --warning: #e9c46a;
            --gray-light: #e5e5e5;
            --gray: #6c757d;
            --gray-dark: #343a40;
            --text-dark: #222;
            --text-light: #555;
            --bg-light: #f7f7f7;
            --white: #fff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        body {
            background: linear-gradient(135deg, #2a5ca9 0%, #1a3d6e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            text-align: center;
        }

        .logo {
            margin-bottom: 25px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid var(--primary);
        }

        .logo h2 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .logo p {
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--gray-light);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(42, 92, 169, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .error-message {
            background: rgba(230, 57, 70, 0.1);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .register-link {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .auto-login-error {
            background: rgba(230, 57, 70, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 10px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--danger);
            display: none;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Login Container -->
    <div id="loginContainer" class="login-container">
        <div class="logo">
            <img src="at-the-den-logo.png" alt="At the Den Logo" class="logo-icon" onerror="this.src='https://via.placeholder.com/80?text=LU'">
            <h2>At the Den Alert</h2>
            <p>Lincoln University Emergency Communication</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>

        <div id="loginError" class="error-message"></div>
        <div id="autoLoginFailed" class="auto-login-error">
            <i class="fas fa-exclamation-triangle"></i> Auto-login failed. Please log in manually.
        </div>

        <div class="register-link">
            Don't have an account? <a href="#" onclick="showRegister()">Register here</a>
        </div>
    </div>

    <!-- Register Container -->
    <div id="registerContainer" class="login-container hidden">
        <div class="logo">
            <img src="at-the-den-logo.png" alt="At the Den Logo" class="logo-icon" onerror="this.src='https://via.placeholder.com/80?text=LU'">
            <h2>Create Account</h2>
            <p>Join the emergency alert system</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="regName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="regEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="regPassword" placeholder="Enter password (min 6 characters)" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-tag"></i> Role</label>
                <select id="regRole" style="width: 100%; padding: 12px 15px; border: 1px solid var(--gray-light); border-radius: 8px; font-size: 1rem;">
                    <option value="student">Student</option>
                    <option value="staff">Staff</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="login-btn">Register</button>
        </form>

        <div id="registerError" class="error-message"></div>

        <div class="register-link">
            Already have an account? <a href="#" onclick="showLogin()">Login here</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://at-the-den-alert.onrender.com';

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const autoLoginError = document.getElementById('autoLoginFailed');
            
            errorDiv.style.display = 'none';
            if (autoLoginError) autoLoginError.style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Save token and user data
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.data));
                    
                    // Redirect based on role
                    if (data.data.role === 'admin' || data.data.role === 'staff') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    errorDiv.textContent = data.error || 'Login failed. Please check your credentials.';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Make sure the server is running on port 5000.';
                errorDiv.style.display = 'block';
            }
        });

        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            const errorDiv = document.getElementById('registerError');
            
            errorDiv.style.display = 'none';
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Registration successful! Please login.');
                    showLogin();
                    document.getElementById('loginError').textContent = 'Registration successful! Please login.';
                    document.getElementById('loginError').style.display = 'block';
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Make sure the server is running.';
                errorDiv.style.display = 'block';
            }
        });

        function showLogin() {
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('registerContainer').classList.add('hidden');
            document.getElementById('loginError').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('registerContainer').classList.remove('hidden');
            document.getElementById('registerError').style.display = 'none';
        }

        // Check for existing token on page load
        async function checkExistingLogin() {
            const token = localStorage.getItem('token');
            if (!token) return;
            
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        // Redirect based on role
                        if (data.data.role === 'admin' || data.data.role === 'staff') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }
                }
            } catch (error) {
                console.error('Auto-login check failed:', error);
            }
        }

        // Check for existing session
        checkExistingLogin();
    </script>
</body>
</html>
